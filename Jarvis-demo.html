<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J.A.R.V.I.S | System Interface</title>
    <style>
        /* ========== JARVIS THEME CSS ========== */
        :root {
            --bg-dark: #020617;
            --jarvis-cyan: #00f0ff;
            --jarvis-blue: #1e3a8a;
            --jarvis-glow: rgba(0, 240, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at center, #0a192f 0%, #020617 100%),
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--jarvis-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== THE HOLOGRAPHIC CORE ========== */
        .jarvis-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }

        /* Center Glowing Orb */
        .core {
            width: 80px;
            height: 80px;
            background: var(--jarvis-cyan);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--jarvis-cyan), 0 0 100px var(--jarvis-cyan);
            animation: core-pulse 1.5s infinite alternate ease-in-out;
            z-index: 10;
        }

        /* Rotating Ring 1 (Dashed) */
        .ring-1 {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px dashed var(--jarvis-cyan);
            border-radius: 50%;
            animation: spin-right 4s linear infinite;
            opacity: 0.8;
        }

        /* Rotating Ring 2 (Dotted) */
        .ring-2 {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 3px dotted rgba(0, 240, 255, 0.5);
            border-radius: 50%;
            animation: spin-left 6s linear infinite;
        }

        /* Rotating Ring 3 (Solid with gaps) */
        .ring-3 {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 1px solid transparent;
            border-top: 4px solid var(--jarvis-cyan);
            border-bottom: 4px solid var(--jarvis-cyan);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--jarvis-glow);
            animation: spin-right 3s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* Outer Radar Circle */
        .radar {
            position: absolute;
            width: 350px;
            height: 350px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 50%;
        }

        .radar::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 175px;
            height: 2px;
            background: linear-gradient(90deg, var(--jarvis-cyan), transparent);
            transform-origin: left center;
            animation: radar-scan 2s linear infinite;
        }

        /* ========== AUDIO VISUALIZER (Voice Waves) ========== */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 40px;
            margin-bottom: 30px;
        }

        .bar {
            width: 6px;
            background: var(--jarvis-cyan);
            border-radius: 3px;
            box-shadow: 0 0 10px var(--jarvis-cyan);
            animation: bounce 0.5s infinite alternate ease-in;
        }

        /* Different delays for realistic wave effect */
        .bar:nth-child(1) {
            animation-delay: 0.1s;
            height: 10px;
        }

        .bar:nth-child(2) {
            animation-delay: 0.3s;
            height: 20px;
        }

        .bar:nth-child(3) {
            animation-delay: 0.0s;
            height: 35px;
        }

        .bar:nth-child(4) {
            animation-delay: 0.4s;
            height: 15px;
        }

        .bar:nth-child(5) {
            animation-delay: 0.2s;
            height: 25px;
        }

        .bar:nth-child(6) {
            animation-delay: 0.5s;
            height: 10px;
        }

        /* ========== TERMINAL LOGS ========== */
        .terminal {
            width: 90%;
            max-width: 600px;
            height: 120px;
            background: rgba(0, 24, 40, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            overflow-y: hidden;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .log-line {
            margin: 5px 0;
            font-size: 0.95rem;
            text-shadow: 0 0 5px var(--jarvis-cyan);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: var(--jarvis-cyan);
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        /* ========== ANIMATION KEYFRAMES ========== */
        @keyframes core-pulse {
            0% {
                transform: scale(0.85);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        @keyframes spin-right {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-left {
            100% {
                transform: rotate(-360deg);
            }
        }

        @keyframes radar-scan {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes bounce {
            0% {
                transform: scaleY(0.3);
            }

            100% {
                transform: scaleY(1.5);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--jarvis-cyan);
            text-decoration: none;
            border: 1px solid var(--jarvis-cyan);
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--jarvis-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--jarvis-cyan);
        }
    </style>
</head>

<body>

    <a href="projects.html" class="back-btn">← RETURN TO SECURE SYSTEM</a>

    <!-- Audio Player (Hidden) -->
    <audio id="jarvisAudio" src="welcome-home-from-jarvis.mp3" autoplay></audio>

    <!-- Jarvis Holographic Animation -->
    <div class="jarvis-container">
        <div class="radar"></div>
        <div class="ring-3"></div>
        <div class="ring-2"></div>
        <div class="ring-1"></div>
        <div class="core"></div>
    </div>

    <!-- Voice Audio Waves -->
    <div class="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <!-- Terminal Typing Effect -->
    <div class="terminal" id="terminalBox">
        <!-- Lines will be injected by JavaScript -->
    </div>

    <script>
        // Boot Sequence Logs related to your actual skills
        const logs = [
            "[SYSTEM] Booting J.A.R.V.I.S Artificial Intelligence...",
            "[NETWORK] Checking the Network Connection... Success.",
            "[DATABASE] Connecting to Your Secure Database... Success.",
            "[MODULES] Initializing Python NLP & Automation Scripts...",
            "[UI] Loading Jetpack Compose Architecture...",
            "[AUDIO] Voice Recognition Module Online.",
            "> GREETINGS, MANAS. ALL SYSTEMS ARE FULLY OPERATIONAL."
        ];

        const terminalBox = document.getElementById('terminalBox');
        let logIndex = 0;

        // Typewriter effect function
        function typeWriter(text, i, element, callback) {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1, element, callback), 30); // Typing speed
            } else {
                setTimeout(callback, 600); // Wait before next line
            }
        }

        // Process logs one by one
        function processLogs() {
            if (logIndex < logs.length) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'log-line';
                terminalBox.appendChild(lineDiv);

                // Highlight the final message
                if (logIndex === logs.length - 1) {
                    lineDiv.style.fontWeight = 'bold';
                    lineDiv.style.color = '#fff';
                }

                // Remove old cursor
                const oldCursor = document.querySelector('.cursor');
                if (oldCursor) oldCursor.remove();

                typeWriter(logs[logIndex], 0, lineDiv, () => {
                    logIndex++;
                    // Auto-scroll terminal
                    terminalBox.scrollTop = terminalBox.scrollHeight;
                    processLogs();
                });

                // Add blinking cursor to the current line
                lineDiv.innerHTML += '<span class="cursor"></span>';
            }
        }

        // Start sequence on load
        window.onload = () => {
            // Attempt to play audio automatically
            const audio = document.getElementById('jarvisAudio');
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Browser auto-play policy prevented audio from playing."));

            processLogs();
        };
    </script>

</body>

</html>
